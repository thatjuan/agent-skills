<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Marginalia masthead">
  <!-- Editorial masthead lockup: small caps issue line + canonical
       wordmark + stamp-red baseline rule. Reads like a literary
       magazine nameplate. -->
  <g font-family="'Work Sans', 'Inter', -apple-system, sans-serif"
     font-size="14" font-weight="500" letter-spacing="4" fill="#1A1816">
    <text x="22" y="32">A LITERARY MONTHLY</text>
    <text x="538" y="32" text-anchor="end" fill="#B23A3C">No. 047</text>
  </g>
  <!-- Top hairline rule -->
  <rect x="22" y="44" width="516" height="1" fill="#1A1816"/>
  <!-- Wordmark -->
  <g font-family="'Fraunces', 'Playfair Display', 'Libre Caslon Display', Georgia, serif"
     font-weight="700" fill="#1A1816">
    <text x="20" y="138" font-size="90" letter-spacing="-1">Marg</text>
    <text x="282" y="138" font-size="90" letter-spacing="-1">nalia</text>
  </g>
  <rect x="266" y="80" width="6" height="58" fill="#1A1816"/>
  <!-- Stamp-red baseline rule -->
  <rect x="22" y="164" width="516" height="3" fill="#B23A3C"/>
</svg>
