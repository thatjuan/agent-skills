<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Marginalia monogram">
  <!-- Icon derivative: M monogram with a margin rule. A wordmark-only
       brand needs a symbol for small sizes — this is the handshake
       between the wordmark and the icon. -->
  <rect width="200" height="200" fill="#F4EBDD"/>
  <text x="100" y="148" text-anchor="middle"
        font-family="'Fraunces', 'Playfair Display', 'Libre Caslon Display', Georgia, serif"
        font-weight="700" font-size="168" letter-spacing="-4" fill="#1A1816">M</text>
  <rect x="34" y="164" width="132" height="3" fill="#B23A3C"/>
</svg>
